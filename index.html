<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vany | tp13</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            /* Устанавливаем картинку на фон с легким затемнением */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('pikachu.webp') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            /* Усиливаем блюр и прозрачность для эффекта стекла на фоне картинки */
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        /* Остальной ваш CSS без изменений */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(45deg, #333, #111);
            margin: 0 auto 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        h1 { font-size: 26px; margin-bottom: 8px; letter-spacing: -0.5px; }
        .description { color: #ccc; font-size: 14px; margin-bottom: 30px; }
        .links { display: flex; flex-direction: column; gap: 10px; }
        .link-item {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            outline: none;
            display: block;
        }
        .link-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        footer {
            margin-top: 25px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<canvas id="snow-canvas"></canvas>

<div class="card">
    <div class="avatar">🐧</div>
    <h1>vany</h1>
    <p class="description">just a cool guy, learning C, know python</p>

    <div class="links">
        <a href="http://t.me/tuxxsett" target="_blank" class="link-item">Telegram</a>
        <div id="discord-btn" class="link-item">Discord</div>
        <a href="https://github.com/vany-droid" target="_blank" class="link-item">GitHub</a>
    </div>

    <footer>
        fantastiks
    </footer>
</div>

<script>
    // Весь ваш JS код остается прежним
    const discordBtn = document.getElementById('discord-btn');
    const discordUser = "amsoluckylucky";

    discordBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(discordUser).then(() => {
            const originalText = discordBtn.innerText;
            discordBtn.innerText = "Copied!";
            discordBtn.style.borderColor = "#1abc9c";
            setTimeout(() => {
                discordBtn.innerText = originalText;
                discordBtn.style.borderColor = "rgba(255, 255, 255, 0.08)";
            }, 2000);
        });
    });

    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, snowflakes;

    function init() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        snowflakes = [];
        for (let i = 0; i < 150; i++) {
            snowflakes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                r: Math.random() * 3 + 1,
                v: Math.random() * 1 + 0.5
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.beginPath();
        for (let i = 0; i < snowflakes.length; i++) {
            let p = snowflakes[i];
            ctx.moveTo(p.x, p.y);
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, true);
        }
        ctx.fill();
        update();
    }

    function update() {
        for (let i = 0; i < snowflakes.length; i++) {
            let p = snowflakes[i];
            p.y += p.v;
            if (p.y > height) {
                p.y = -10;
                p.x = Math.random() * width;
            }
        }
    }

    function animate() {
        draw();
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', init);
    init();
    animate();
</script>

</body>
</html>
